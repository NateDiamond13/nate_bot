[workspace]
members = ["discord_bot", "lib/database", "lib/utils", "lib/webhooks", "worker"]
package.version = "0.1.0"
package.edition = "2021"
resolver = "2"

[workspace.dependencies]
celery = "=0.5.5"
chrono = "=0.4.38"
dotenvy = "=0.15.7"
env_logger = "=0.11.5"
poise = { git = "https://github.com/serenity-rs/poise", branch = "serenity-next" }
rand = "=0.8.5"
regex = "=1.11.1"
reqwest = { version = "=0.12.9", default-features = false, features = [
    "rustls-tls",
] }
serde = "=1.0.215"
serenity = { git = "https://github.com/serenity-rs/serenity", branch = "next", features = [
    "temp_cache",
] }
songbird = { git = "https://github.com/serenity-rs/songbird", branch = "serenity-next", features = [
    "builtin-queue",
] }
sqlx = { version = "=0.8.2", features = [
    "chrono",
    "postgres",
    "runtime-tokio",
    "tls-rustls",
] }
symphonia = { version = "=0.5.4", features = ["all-codecs", "all-formats"] }
thirtyfour = "=0.34.0"
thiserror = "=2.0.3"
tokio = { version = "=1.41.1", features = [
    "macros",
    "rt-multi-thread",
    "signal",
] }
