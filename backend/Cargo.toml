[workspace]
members = ["discord_bot", "lib/database", "lib/utils", "lib/webhooks", "worker"]
package.version = "0.1.0"
package.edition = "2024"
resolver = "3"

[workspace.dependencies]
celery = "=0.5.5"
chrono = "=0.4.42"
dotenvy = "=0.15.7"
env_logger = "=0.11.8"
htmd = "=0.3.2"
log = "=0.4.28"
poise = { git = "https://github.com/serenity-rs/poise", branch = "serenity-next" }
rand = "=0.9.2"
regex = "=1.12.2"
reqwest = { version = "=0.12.24", default-features = false, features = [
    "json",
    "rustls-tls",
] }
reqwest-middleware = "=0.4.2"
reqwest-retry = "=0.7.0"
serde = "=1.0.228"
serenity = { git = "https://github.com/serenity-rs/serenity", branch = "next", features = [
    "temp_cache",
] }
songbird = { git = "https://github.com/serenity-rs/songbird", branch = "serenity-next", features = [
    "builtin-queue",
] }
sqlx = { version = "=0.8.6", features = [
    "chrono",
    "postgres",
    "runtime-tokio",
    "tls-rustls",
] }
symphonia = { version = "=0.5.5", features = ["all-codecs", "all-formats"] }
test-log = { version = "=0.2.18", features = ["trace", "color"] }
thirtyfour = "=0.36.1"
thiserror = "=2.0.17"
tokio = { version = "=1.47.1", features = [
    "macros",
    "rt-multi-thread",
    "signal",
] }
url = "=2.5.7"
