[workspace]
members = ["discord_bot", "lib/database", "lib/utils", "lib/webhooks", "worker"]
package.version = "0.1.0"
package.edition = "2021"
resolver = "2"

[workspace.dependencies]
celery = "=0.5.5"
chrono = "=0.4.39"
dotenvy = "=0.15.7"
env_logger = "=0.11.6"
htmd = "=0.1.6"
poise = { git = "https://github.com/serenity-rs/poise", branch = "serenity-next" }
rand = "=0.9.0"
regex = "=1.11.1"
reqwest = { version = "=0.12.12", default-features = false, features = [
    "json",
    "rustls-tls",
] }
reqwest-middleware = "=0.4.0"
reqwest-retry = "=0.7.0"
serde = "=1.0.217"
serenity = { git = "https://github.com/serenity-rs/serenity", branch = "next", features = [
    "temp_cache",
] }
songbird = { git = "https://github.com/serenity-rs/songbird", branch = "serenity-next", features = [
    "builtin-queue",
] }
sqlx = { version = "=0.8.3", features = [
    "chrono",
    "postgres",
    "runtime-tokio",
    "tls-rustls",
] }
symphonia = { version = "=0.5.4", features = ["all-codecs", "all-formats"] }
thirtyfour = "=0.35.0"
thiserror = "=2.0.11"
tokio = { version = "=1.43.0", features = [
    "macros",
    "rt-multi-thread",
    "signal",
] }
url = "=2.5.4"
